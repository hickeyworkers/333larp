<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>iqmaxx | monochrome neon</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: #000000;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Consolas', 'Courier New', monospace;
            position: relative;
            padding: 20px;
        }

        /* Фон — чёрный с лёгкой дымкой */
        .bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 30% 20%, #0a0a0a, #000000);
            z-index: 0;
        }

        /* Частицы — серые */
        #particles {
            position: fixed;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            z-index: 1;
            pointer-events: none;
            opacity: 0.4;
        }

        /* Контейнер с переливающимся неоном по краям */
        .container {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 460px;
            background: rgba(5, 5, 5, 0.85);
            backdrop-filter: blur(12px);
            border-radius: 32px;
            padding: 24px 20px;
            box-shadow: 0 0 30px rgba(0,0,0,0.8);
            animation: neonPulse 3s ease-in-out infinite;
        }

        /* Анимация переливающейся неоновой рамки */
        @keyframes neonPulse {
            0% {
                box-shadow: 0 0 5px rgba(200,200,200,0.2), 0 0 10px rgba(200,200,200,0.1), inset 0 0 5px rgba(200,200,200,0.05);
                border-color: rgba(200,200,200,0.3);
            }
            50% {
                box-shadow: 0 0 20px rgba(255,255,255,0.4), 0 0 35px rgba(200,200,200,0.2), inset 0 0 10px rgba(255,255,255,0.1);
                border-color: rgba(255,255,255,0.6);
            }
            100% {
                box-shadow: 0 0 5px rgba(200,200,200,0.2), 0 0 10px rgba(200,200,200,0.1), inset 0 0 5px rgba(200,200,200,0.05);
                border-color: rgba(200,200,200,0.3);
            }
        }

        .container {
            border: 1px solid rgba(255,255,255,0.3);
            transition: all 0.3s ease;
        }

        /* Шапка */
        .header {
            display: flex;
            align-items: center;
            gap: 18px;
            margin-bottom: 24px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding-bottom: 16px;
        }

        /* ЗВЕЗДА (прелоадер) — крутится, серая */
        .star {
            position: relative;
            width: 75px;
            height: 75px;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .star-piece {
            position: absolute;
            background-color: #cccccc;
            clip-path: polygon(50% 0%, 61% 35%, 98% 35%, 68% 57%, 79% 91%, 50% 70%, 21% 91%, 32% 57%, 2% 35%, 39% 35%);
            animation: spinStar 6s linear infinite;
        }
        .s1 { width: 14%; animation-delay: 0s; }
        .s2 { width: 17%; animation-delay: 0.9s; }
        .s3 { width: 20%; animation-delay: 1.5s; }
        .s4 { width: 23%; animation-delay: 2.1s; }
        .s5 { width: 26%; animation-delay: 2.7s; }
        @keyframes spinStar {
            to { transform: rotate(360deg); }
        }

        .info h1 {
            font-size: 26px;
            letter-spacing: 2px;
            background: linear-gradient(135deg, #ddd, #fff, #aaa);
            background-size: 200% auto;
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .badge {
            font-size: 10px;
            color: #888;
            background: rgba(255,255,255,0.05);
            display: inline-block;
            padding: 2px 10px;
            border-radius: 20px;
            margin-top: 5px;
        }

        /* Кнопка Telegram с переливающейся рамкой */
        .tg-btn {
            display: block;
            background: #111;
            border: 1px solid rgba(255,255,255,0.3);
            border-radius: 60px;
            padding: 14px;
            text-align: center;
            text-decoration: none;
            margin-bottom: 28px;
            transition: all 0.3s ease;
            animation: btnNeonPulse 3s ease-in-out infinite;
        }
        @keyframes btnNeonPulse {
            0% {
                box-shadow: 0 0 2px rgba(255,255,255,0.2);
                border-color: rgba(255,255,255,0.3);
            }
            50% {
                box-shadow: 0 0 12px rgba(255,255,255,0.4);
                border-color: rgba(255,255,255,0.7);
            }
            100% {
                box-shadow: 0 0 2px rgba(255,255,255,0.2);
                border-color: rgba(255,255,255,0.3);
            }
        }
        .tg-btn:hover {
            background: #1a1a1a;
            transform: translateY(-2px);
            animation: none;
            box-shadow: 0 0 18px rgba(255,255,255,0.5);
            border-color: #fff;
        }
        .tg-flex {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            color: #ccc;
            font-weight: 600;
            font-size: 16px;
        }
        .tg-flex i { font-size: 22px; color: #aaa; }

        /* Карточка данных — тоже с неоном */
        .card {
            background: #0a0a0a;
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 20px;
            padding: 14px;
            margin-bottom: 10px;
            transition: all 0.3s ease;
            animation: cardNeonPulse 3s ease-in-out infinite;
        }
        @keyframes cardNeonPulse {
            0% {
                box-shadow: 0 0 2px rgba(255,255,255,0.1);
                border-color: rgba(255,255,255,0.2);
            }
            50% {
                box-shadow: 0 0 10px rgba(255,255,255,0.2);
                border-color: rgba(255,255,255,0.5);
            }
            100% {
                box-shadow: 0 0 2px rgba(255,255,255,0.1);
                border-color: rgba(255,255,255,0.2);
            }
        }
        .card-title {
            color: #ccc;
            font-size: 11px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
            letter-spacing: 1px;
        }
        .row-line {
            display: flex;
            justify-content: space-between;
            border-bottom: 1px dashed #2a2a2a;
            padding: 7px 0;
            font-size: 11px;
            font-family: monospace;
            color: #aaa;
        }
        .label {
            color: #888;
            font-weight: bold;
        }
        .value {
            color: #bbb;
        }

        /* Инфоблок — минималистичный */
        .info-block {
            background: rgba(10,10,10,0.4);
            border-left: 2px solid #888;
            padding: 8px 12px;
            margin-bottom: 20px;
            font-size: 10px;
            color: #999;
        }

        /* === КРУГЛЫЕ КНОПКИ В УГЛУ === */
        .social-corner {
            position: fixed;
            bottom: 25px;
            right: 25px;
            z-index: 20;
        }
        .wrapper {
            display: inline-flex;
            list-style: none;
            gap: 12px;
            background: rgba(10,10,10,0.7);
            backdrop-filter: blur(8px);
            padding: 10px 16px;
            border-radius: 60px;
            border: 1px solid rgba(255,255,255,0.15);
        }
        .wrapper .icon {
            position: relative;
            background: #111;
            border-radius: 50%;
            width: 44px;
            height: 44px;
            font-size: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.2);
            color: #ccc;
            border: 1px solid rgba(255,255,255,0.2);
        }
        .wrapper .tooltip {
            position: absolute;
            top: -40px;
            font-size: 11px;
            background: #111;
            color: #ccc;
            padding: 4px 10px;
            border-radius: 20px;
            white-space: nowrap;
            opacity: 0;
            pointer-events: none;
            transition: all 0.3s;
            border: 1px solid #333;
        }
        .wrapper .icon:hover .tooltip {
            top: -45px;
            opacity: 1;
        }
        .wrapper .icon:hover {
            transform: translateY(-4px);
            background: #222;
            color: #fff;
            border-color: #888;
        }
        .wrapper .icon.disabled {
            opacity: 0.45;
            cursor: not-allowed;
        }
        .wrapper .icon.disabled:hover {
            transform: none;
            background: #111;
            color: #ccc;
            border-color: rgba(255,255,255,0.2);
        }
        .cross-mark {
            position: absolute;
            top: -6px;
            right: -6px;
            background: #aa2e2e;
            color: white;
            font-size: 9px;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            pointer-events: none;
        }

        @media (max-width: 500px) {
            .container { padding: 18px; }
            .info h1 { font-size: 22px; }
            .star { width: 60px; height: 60px; }
            .wrapper { padding: 6px 12px; gap: 8px; }
            .wrapper .icon { width: 38px; height: 38px; font-size: 18px; }
            .social-corner { bottom: 15px; right: 15px; }
        }
    </style>
</head>
<body>
    <div class="bg"></div>
    <canvas id="particles"></canvas>
    <div class="container">
        <!-- ШАПКА СО ЗВЕЗДОЙ -->
        <div class="header">
            <div class="star">
                <div class="star-piece s1"></div>
                <div class="star-piece s2"></div>
                <div class="star-piece s3"></div>
                <div class="star-piece s4"></div>
                <div class="star-piece s5"></div>
            </div>
            <div class="info">
                <h1>iqmaxx</h1>
                <div class="badge">● ROOT ACCESS</div>
            </div>
        </div>

        <!-- КНОПКА ТГ -->
        <a href="https://t.me/centrie" target="_blank" class="tg-btn">
            <div class="tg-flex">
                <i class="fab fa-telegram-plane"></i>
                <span>НАПИСАТЬ МНЕ</span>
                <i class="fas fa-arrow-right"></i>
            </div>
        </a>

        <!-- Минимальный информационный блок -->
        <div class="info-block">
            <i class="fas fa-shield-alt" style="margin-right: 6px;"></i> session active · encrypted channel
        </div>

        <!-- ТОЛЬКО КАРТОЧКА ДАННЫХ (IP, локация, провайдер, FP) -->
        <div class="card">
            <div class="card-title"><i class="fas fa-globe"></i> [ GEOLOCATION & IP ]</div>
            <div class="row-line"><span class="label">IPv4</span><span class="value" id="userIp">--.--.--.--</span></div>
            <div class="row-line"><span class="label">LOCATION</span><span class="value" id="userLocation">fetching...</span></div>
            <div class="row-line"><span class="label">ISP / HOST</span><span class="value" id="userIsp">--</span></div>
            <div class="row-line"><span class="label">BROWSER FP</span><span class="value" id="browserFp">encrypted</span></div>
        </div>
    </div>

    <!-- КРУГЛЫЕ КНОПКИ В УГЛУ (Telegram рабочий, остальные с крестиками) -->
    <div class="social-corner">
        <ul class="wrapper">
            <li class="icon telegram" id="tgIcon">
                <span class="tooltip">Telegram</span>
                <i class="fab fa-telegram-plane"></i>
            </li>
            <li class="icon instagram disabled">
                <span class="tooltip">Instagram</span>
                <i class="fab fa-instagram"></i>
                <div class="cross-mark">✕</div>
            </li>
            <li class="icon twitter disabled">
                <span class="tooltip">Twitter</span>
                <i class="fab fa-twitter"></i>
                <div class="cross-mark">✕</div>
            </li>
            <li class="icon github disabled">
                <span class="tooltip">GitHub</span>
                <i class="fab fa-github"></i>
                <div class="cross-mark">✕</div>
            </li>
        </ul>
    </div>

    <script>
        // ===================== IP / ГЕО (РЕАЛЬНЫЙ) =====================
        async function fetchGeo() {
            try {
                const res = await fetch('https://ipapi.co/json/');
                const data = await res.json();
                if (data.ip) {
                    document.getElementById('userIp').innerText = data.ip;
                    const location = `${data.city || 'unknown'}, ${data.country_name || ''}`;
                    document.getElementById('userLocation').innerText = location || 'unknown';
                    document.getElementById('userIsp').innerText = data.org || 'unknown provider';
                } else {
                    fallbackGeo();
                }
            } catch(e) {
                fallbackGeo();
            }
        }
        
        function fallbackGeo() {
            document.getElementById('userIp').innerText = '185.191.126.215';
            document.getElementById('userLocation').innerText = 'Amsterdam, NL';
            document.getElementById('userIsp').innerText = 'dc2 / tracked';
        }
        
        function setFingerprint() {
            const ua = navigator.userAgent;
            const fp = btoa(ua.slice(0, 20) + screen.width + screen.height).substring(0, 14);
            document.getElementById('browserFp').innerText = fp + '...[locked]';
        }
        
        // ===================== TELEGRAM =====================
        const tgIcon = document.getElementById('tgIcon');
        tgIcon.addEventListener('click', function(e) {
            e.preventDefault();
            window.location.href = 'tg://user?id=1013009081';
            setTimeout(() => {
                window.open('https://t.me/centrie', '_blank');
            }, 200);
        });
        
        // ===================== ЧАСТИЦЫ (серые) =====================
        const canvas = document.getElementById('particles');
        const ctx = canvas.getContext('2d');
        let width = window.innerWidth, height = window.innerHeight;
        let particles = [];
        class Particle {
            constructor() {
                this.x = Math.random() * width;
                this.y = Math.random() * height;
                this.size = Math.random() * 2 + 0.5;
                this.speedX = (Math.random() - 0.5) * 0.2;
                this.speedY = (Math.random() - 0.5) * 0.12;
            }
            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                if (this.x < 0) this.x = width;
                if (this.x > width) this.x = 0;
                if (this.y < 0) this.y = height;
                if (this.y > height) this.y = 0;
            }
            draw() {
                ctx.fillStyle = `rgba(160, 160, 160, ${Math.random() * 0.2 + 0.05})`;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }
        function initParticles(count) {
            particles = [];
            for(let i = 0; i < count; i++) particles.push(new Particle());
        }
        function animateParticles() {
            if(!ctx) return;
            ctx.clearRect(0, 0, width, height);
            particles.forEach(p => { p.update(); p.draw(); });
            requestAnimationFrame(animateParticles);
        }
        function resizeCanvas() {
            width = window.innerWidth;
            height = window.innerHeight;
            canvas.width = width;
            canvas.height = height;
            initParticles(90);
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();
        animateParticles();
        
        fetchGeo();
        setFingerprint();
    </script>
</body>
</html>
